<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recruiter Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden">
        
        <header class="bg-slate-900 text-white p-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold"><i class="fas fa-brain text-blue-400 mr-2"></i> NLP Recruiter Dashboard</h1>
                <p class="text-slate-400 text-sm mt-1">Automated Candidate Scoring & Ingestion</p>
            </div>
            <div class="flex gap-3">
                <button id="demoBtn" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm transition">Load Demo Data</button>
                <button id="exportBtn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-bold transition"><i class="fas fa-download mr-2"></i> Export CSV</button>
            </div>
        </header>

        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="border-2 border-dashed border-slate-200 rounded-lg p-6 text-center hover:border-blue-400 transition bg-slate-50">
                    <h2 class="font-bold text-lg mb-2 text-slate-700">1. Target Baseline (JD)</h2>
                    <input type="file" id="jdInput" class="block w-full text-sm text-slate-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer"/>
                    <button id="uploadJdBtn" class="w-full bg-blue-600 text-white py-2 rounded-md font-semibold hover:bg-blue-700 disabled:opacity-50">Upload JD</button>
                </div>
                
                <div class="border-2 border-dashed border-slate-200 rounded-lg p-6 text-center hover:border-green-400 transition bg-slate-50">
                    <h2 class="font-bold text-lg mb-2 text-slate-700">2. Parse Candidates (Resumes)</h2>
                    <input type="file" id="resumeInput" multiple class="block w-full text-sm text-slate-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-green-100 file:text-green-700 hover:file:bg-green-200 cursor-pointer"/>
                    <button id="uploadResumeBtn" class="w-full bg-green-600 text-white py-2 rounded-md font-semibold hover:bg-green-700 disabled:opacity-50">Upload Resumes</button>
                </div>
            </div>

            <div class="border border-slate-200 rounded-lg overflow-hidden">
                <div class="bg-slate-100 p-4 border-b border-slate-200 flex justify-between items-center">
                    <h3 class="font-bold text-slate-700">Ranked Pipeline</h3>
                    <button id="refreshBtn" class="text-blue-600 text-sm hover:underline"><i class="fas fa-sync-alt mr-1"></i> Sync with AWS</button>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white text-xs uppercase text-slate-500">
                        <tr class="border-b border-slate-200">
                            <th class="p-4 w-1/4">Candidate Info</th>
                            <th class="p-4 w-2/5">Extracted NLP Entities</th>
                            <th class="p-4 w-1/5 text-center">Match Score</th>
                            <th class="p-4 w-1/5 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
